// ---- OPD date calculator ----
function getNextOPD(){
  const now=new Date();
  const day=now.getDay(); // 0=Sun,1=Mon,...,4=Thu
  let next1=new Date(now),next4=new Date(now);
  // next Monday
  let d1=(1-day+7)%7; if(d1===0)d1=7;
  next1.setDate(now.getDate()+d1);
  // next Thursday
  let d4=(4-day+7)%7; if(d4===0)d4=7;
  next4.setDate(now.getDate()+d4);
  const fmt=d=>{const dd=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'][d.getDay()];return dd+' '+(d.getDate())+'/'+(d.getMonth()+1)+'/'+(d.getFullYear()+543)};
  const a=next1<next4?next1:next4;
  const b=next1<next4?next4:next1;
  return{soon:fmt(a),later:fmt(b)};
}
const opd=getNextOPD();
document.getElementById('opd-banner').innerHTML=`📅 <b>OPD Ortho: วันจันทร์ &amp; พฤหัสบดี</b> · นัดได้ที่ <b>${opd.soon}</b> หรือ ${opd.later}`;

];

const catLabel={finger:"Finger/Toe",hand:"Hand/Wrist",forearm:"Forearm",elbow:"Elbow",shoulder:"Shoulder",lower:"Lower Limb"};
let cf="all";

function setFilter(f,el){cf=f;document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));el.classList.add("active");filterDx();}
function filterDx(){
  const q=document.getElementById("search-input").value.toLowerCase();
  const r=document.getElementById("results");
  const f=data.filter(d=>(cf==="all"||d.cat===cf)&&(!q||d.label.toLowerCase().includes(q)||d.sub.toLowerCase().includes(q)));
  if(!f.length){r.innerHTML='<div class="empty">ไม่พบ diagnosis ที่ค้นหา</div>';return;}
  r.innerHTML=f.map(d=>`<div class="ri" onclick="showDetail(${d.id})">
    <div class="ri-dx">${d.label}
      <span class="badge ${d.cat==='lower'?'b-lower':'b-upper'}">${catLabel[d.cat]||d.cat}</span>
      ${d.admit?'<span class="badge b-admit">Admit</span>':''}
    </div>
    <div class="ri-sub">${d.sub}</div>
  </div>`).join("");
}

function showDetail(id){
  const d=data.find(x=>x.id===id);if(!d)return;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail").classList.add("open");
  const nvHtml=d.nv?`<div class="nv-pill">⚠️ ตรวจ Neurovascular ก่อน และหลัง reduction ทุกครั้ง${d.nvNote?'<br><small>'+d.nvNote+'</small>':''}</div>`:"";
  const redHtml=d.reduce?`<div class="reduce-box"><div class="reduce-title">🔧 ${d.reduce.title}</div><div class="reduce-body">${d.reduce.body}</div></div>`:"";
  const admitHtml=typeof d.admit==="string"?`<div class="admit-box" style="margin-bottom:0.5rem"><div class="admit-label">🏥 Admit: </div><div class="admit-val">${d.admit}</div></div>`:"";
  const opdHtml=d.opd?`<div class="opd-box"><div class="opd-label">📅 นัด OPD Orthopaedic</div><div class="opd-val">วันจันทร์ หรือ พฤหัสบดี</div><div class="opd-next">นัดใกล้ที่สุด: <b>${opd.soon}</b> หรือ ${opd.later}</div></div>`:`<div class="admit-box"><div class="admit-label">🏥 ต้อง Admit</div><div class="admit-val">${typeof d.admit==="string"?d.admit:"ผ่าตัดทุกเคส — แจ้งแพทย์ ortho"}</div></div>`;
  const svg=D[d.dKey]||"";
  document.getElementById("detail-content").innerHTML=`
    <div class="dx-title">${d.label}</div>
    <div class="dx-sub">${d.sub}</div>
    <div class="divider"></div>
    <div style="margin-bottom:1rem">
      <div class="sec-label">🩹 Immobilization</div>
      ${nvHtml}
      <div class="immob-card">
        <div class="immob-title">${d.immob}</div>
        <div class="immob-body">${d.immobDetail}</div>
        <div class="immob-meta"><span><b>ท่า:</b> ตามชนิด slab ด้านล่าง</span></div>
      </div>
      ${svg?`<div class="diagram-wrap">${svg}<div class="diagram-cap">${d.dCap}</div></div>`:""}
      ${redHtml}
    </div>
    ${admitHtml}
    <div style="margin-bottom:1rem">
      <div class="sec-label">🏠 คำแนะนำผู้ป่วยกลับบ้าน</div>
      <ul class="advise-list">${d.advise.map(a=>`<li>${a}</li>`).join("")}</ul>
    </div>
    <div style="margin-bottom:1rem">${opdHtml}</div>
    <div>
      <div class="sec-label">🚨 แจ้งแพทย์ Ortho ฉุกเฉิน (เฉพาะกรณีนี้เท่านั้น)</div>
      <div class="er-box">
        <div class="er-label">Emergency / Urgency จริงๆ เท่านั้น</div>
        <ul class="advise-list">${d.er.map(e=>`<li>${e}</li>`).join("")}</ul>
      </div>
    </div>`;
}
function goBack(){
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail").classList.remove("open");
  document.getElementById("detail-content").innerHTML="";
}
filterDx();
</script>
